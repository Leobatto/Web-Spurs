services:
  db:
    image: postgres:17-alpine
    container_name: jp-spurs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: spurs
      POSTGRES_USER: spurs
      POSTGRES_PASSWORD: spurs_dev_password
    ports:
      - "5433:5432"
    volumes:
      - spurs_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spurs -d spurs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  spurs_postgres_data:
